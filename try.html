<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Impact Stories Slider</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }

        /* Container styling */
        .impact-container {
            width:800px;
            max-width: 1100px;
            position: relative;
            padding: 10px 0;
        }

        /* Swiper wrapper sizing */
        .swiper {
            width: 100%;
            padding: 20px 0;
            
        }

        /* Individual Slide (Logo Circle) */
        .impact-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s ease;
        }

        .logo-ring {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 7px solid #44767b; /* Teal color like your screenshot */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            
            padding: 20px;
             
        }

        .logo-ring img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Navigation Arrows */
        .swiper-button-next, .swiper-button-prev {
            color: #44767b;
            transform: scale(0.7);
            width:-102px;
             
        }

        /* Responsive Settings */
        @media (max-width: 768px) {
             .impact-container {
            width:300px;
            
            
        }
             
            .logo-ring {
                width: 120px;
                height: 120px;
                padding:15px;
            }
             .logo-ring img {
            width: 100%;
            height: 100%;
             
        }
        }
    </style>
</head>
<body>

    <div class="impact-container">
        <div class="swiper mySwiper">
            <div class="swiper-wrapper">
                
                <div class="swiper-slide">
                    <div class="impact-card">
                        <div class="logo-ring">
                            <img src="images/Digital_Impact_Stories/DAV TV_LOGO_Alfa_Low.png" alt="DAV TV">
                        </div>
                    </div>
                </div>

                <div class="swiper-slide">
                    <div class="impact-card">
                        <div class="logo-ring">
                            <img src="images/Digital_Impact_Stories/Arya Yuva Samaj_Logo.png" alt="Arya Yuva Samaj">
                        </div>
                    </div>
                </div>

                <div class="swiper-slide">
                    <div class="impact-card">
                        <div class="logo-ring">
                            <img src="images/Digital_Impact_Stories/CAKBS_Logo Circle.png" alt="Superstars">
                        </div>
                    </div>
                </div>

                <div class="swiper-slide">
                    <div class="impact-card">
                        <div class="logo-ring">
                            <img src="images/Digital_Impact_Stories/DAV TV_LOGO_Alfa_Low.png" alt="DAV TV">
                        </div>
                    </div>
                </div>

            </div>
            
            <!-- <div class="swiper-button-next"></div>
            <div class="swiper-button-prev"></div> -->
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script>
        var swiper = new Swiper(".mySwiper", {
            slidesPerView: 1, // Default for very small screens
            spaceBetween: 30,
            loop: true, // Infinite loop
            autoplay: {
                delay: 2500, // 2.5 seconds mein automatic move hoga
                disableOnInteraction: false,
                pauseOnMouseEnter: true,
            },
            navigation: {
                nextEl: ".swiper-button-next",
                prevEl: ".swiper-button-prev",
            },
            breakpoints: {
                // Jab screen 768px se badi ho (Laptop)
                768: {
                    slidesPerView: 3, // 3 slides ek row mein
                },
                // Jab screen phone par ho
                0: {
                    slidesPerView: 2, // 2 slides ek row mein
                }
            },
        });
    </script>
</body>
</html>
